<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Shaurya Enterprises</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

header{
background:#111;
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid gold;
}

header h1{
color:gold;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

nav a:hover{
color:gold;
}

/* HERO */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30');

background-size:cover;
background-position:center;
}

.hero h2{
font-size:50px;
color:gold;
}

/* GALLERY */

.gallery{
padding:80px 10%;
text-align:center;
}

.gallery h2{
color:gold;
font-size:40px;
margin-bottom:40px;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery-grid img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
transition:.4s;
}

.gallery-grid img:hover{
transform:scale(1.05);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:80%;
max-height:80%;
border-radius:10px;
}

/* CLOSE BUTTON */

.close{
position:absolute;
top:30px;
right:50px;
font-size:40px;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
background:#111;
text-align:center;
padding:20px;
border-top:1px solid #333;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<h1>Shaurya Enterprises</h1>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section class="hero">

<h2>Our Event Gallery</h2>
<p>Memories from our beautiful events</p>

</section>


<section class="gallery">

<h2>Event Moments</h2>

<div class="gallery-grid">

<img src="https://images.unsplash.com/photo-1519741497674-611481863552" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1503428593586-e225b39bddfe" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1511578314322-379afb476865" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1505236731920-7f8d0a44c1b2" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1504805572947-34fad45aed93" onclick="openImg(this.src)">

</div>

</section>


<div class="lightbox" id="lightbox">

<span class="close" onclick="closeImg()">×</span>

<img id="lightbox-img">

</div>


<footer>

<p>© 2026 Shaurya Enterprises | Event Management</p>

</footer>


<script>

function openImg(src){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;

}

function closeImg(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
